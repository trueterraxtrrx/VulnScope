services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vulnscope
      POSTGRES_USER: vulnscope
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_only_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnscope -d vulnscope"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
    env_file:
      - .env.example
    depends_on:
      - api
      - redis
    command: celery -A app.worker.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_DEMO_MODE: "true"
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres-data:
